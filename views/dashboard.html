<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Nova Store</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    :root {
      --radius: 8px;
      --primary: #6c63ff;
      --accent: #ff69b4;
      --bg: #f9f9f9;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: var(--bg);
      margin: 0;
      padding: 0;
    }

    .header, .footer {
      background-color: var(--primary);
      color: white;
      text-align: center;
      padding: 20px;
    }

    .dashboard-info {
      text-align: center;
      padding: 30px;
    }

    .button {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: var(--radius);
      text-decoration: none;
      font-size: 1rem;
      transition: background 0.3s ease;
      margin-top: 10px;
      display: inline-block;
    }

    .button:hover {
      background-color: var(--accent);
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto 40px;
    }

    .product-card {
      background-color: white;
      border-radius: var(--radius);
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 15px;
      text-align: center;
    }

    .product-image img {
      max-width: 100%;
      height: auto;
      border-radius: var(--radius);
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Dashboard</h1>
  </div>

  <div class="dashboard-info">
    <p>You are now logged in.</p>
    <a href="/logout" class="button">Logout</a>
  </div>

  <div class="product-grid" id="product-list">Loading products...</div>

  <div class="footer">
    <p>&copy; 2025 Nova Store</p>
  </div>

  <script>
    fetch('/data/products.json')
      .then(response => {
        if (!response.ok) throw new Error('Failed to load products.');
        return response.json();
      })
      .then(products => {
        const container = document.getElementById('product-list');
        container.innerHTML = products.map(p => `
          <div class="product-card">
            <div class="product-image">
              <img src="${p.image}" alt="${p.name}">
            </div>
            <h3>${p.name}</h3>
            <p>Rs. ${p.price.toFixed(2)}</p>
            <a href="product.html?id=${p.id}" class="button">View</a>
            <button class="button" onclick="addToCart(${p.id})">Add to Cart</button>
          </div>
        `).join('');
      })
      .catch(error => {
        console.error('Error:', error);
        document.getElementById('product-list').innerHTML = '<p>Failed to load products.</p>';
      });

    function addToCart(productId) {
      const cart = JSON.parse(localStorage.getItem("cart")) || [];
      cart.push(productId);
      localStorage.setItem("cart", JSON.stringify(cart));
      alert("Added to cart!");
    }
  </script>

</body>
</html>
