<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Wishlist</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="header">
    <h1>❤️ Your Wishlist</h1>
  </div>

  <div class="product-grid" id="wishlist-items">
    <p>Loading wishlist...</p>
  </div>

  <div class="footer">
    <a href="index.html" class="button">← Back to Shop</a>
    <p>&copy; 2025 Nova Store</p>
  </div>

  <script>
    const wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
    const container = document.getElementById("wishlist-items");

    if (wishlist.length === 0) {
      container.innerHTML = "<p>Your wishlist is empty.</p>";
    } else {
      fetch('/data/products.json')
        .then(res => res.json())
        .then(products => {
          const items = wishlist.map(id => products.find(p => p.id === id)).filter(Boolean);
          if (items.length === 0) {
            container.innerHTML = "<p>Products not found or removed.</p>";
            return;
          }

          container.innerHTML = items.map(p => `
            <div class="product-card">
              <div class="product-image">
                <img src="${p.image}" alt="${p.name}">
              </div>
              <h3>${p.name}</h3>
              <p>Rs. ${p.price.toFixed(2)}</p>
              <p>⭐ ${p.rating || '4.5'} | ${p.category || 'General'}</p>
              <div style="display: flex; gap: 5px; flex-wrap: wrap; justify-content: center;">
                <button class="button" onclick="removeFromWishlist(${p.id})">Remove</button>
                <button class="button" onclick="addToCart(${p.id})">Add to Cart</button>
                <button class="button" onclick="buyNow(${p.id})">Buy Now</button>
              </div>
            </div>
          `).join("");
        })
        .catch(err => {
          console.error("Failed to load wishlist:", err);
          container.innerHTML = "<p>⚠️ Error loading wishlist.</p>";
        });
    }

    function removeFromWishlist(id) {
      let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
      wishlist = wishlist.filter(item => item !== id);
      localStorage.setItem("wishlist", JSON.stringify(wishlist));
      location.reload();
    }

    function addToCart(id) {
      const cart = JSON.parse(localStorage.getItem("cart")) || [];
      cart.push(id);
      localStorage.setItem("cart", JSON.stringify(cart));
      alert("✅ Added to cart!");
    }

    function buyNow(id) {
      localStorage.setItem("buyNowId", id);
      window.location.href = `product.html?id=${id}`;
    }
  </script>
</body>
</html>
